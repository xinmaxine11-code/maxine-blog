<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="novels.title">茕茕孑立 | Maxine</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23FFB7C5'/><circle cx='38' cy='45' r='5' fill='white'/><circle cx='62' cy='45' r='5' fill='white'/></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Floating Decorations -->
  <div class="decorations">
    <span class="decoration deco-circle"></span>
    <span class="decoration deco-circle"></span>
    <span class="decoration deco-circle"></span>
    <span class="decoration deco-circle"></span>
    <span class="decoration deco-circle"></span>
  </div>

  <!-- Header -->
  <header>
    <div class="container">
      <a href="index.html" class="logo">
        <span data-i18n="site.name">Maxine</span>
      </a>
      <nav>
        <a href="index.html" data-i18n="nav.home">首页</a>
        <a href="novels.html" class="active" data-i18n="nav.novels">小说</a>
        <a href="life.html" data-i18n="nav.life">日常</a>
        <a href="about.html" data-i18n="nav.about">关于我</a>
        <button class="lang-toggle" onclick="toggleLang()" data-i18n="common.langToggle">EN</button>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <main>
    <div class="section-title">
      <h2><span data-i18n="novels.title">小说集</span></h2>
      <p data-i18n="novels.subtitle">每一个故事都是一场冒险</p>
    </div>

    <!-- New Post Button -->
    <div class="page-actions">
      <a href="editor.html" class="btn-new-post">新建小说</a>
    </div>

    <!-- Tag Filter -->
    <div id="tag-filter" class="tag-filter">
      <!-- Loaded dynamically -->
    </div>

    <!-- Novel Cards -->
    <div id="novel-list" class="card-grid">
      <!-- Loaded dynamically -->
    </div>

    <!-- Empty State -->
    <div id="novel-empty" class="empty-state" style="display: none;">
      <svg class="empty-icon" viewBox="0 0 80 80" width="80" height="80">
        <rect x="15" y="10" width="50" height="60" rx="5" fill="none" stroke="#FFB7C5" stroke-width="2"/>
        <line x1="25" y1="25" x2="55" y2="25" stroke="#FFB7C5" stroke-width="2"/>
        <line x1="25" y1="35" x2="55" y2="35" stroke="#FFB7C5" stroke-width="2"/>
        <line x1="25" y1="45" x2="45" y2="45" stroke="#FFB7C5" stroke-width="2"/>
      </svg>
      <p data-i18n="novels.noContent">还没有小说呢，敬请期待！</p>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <p data-i18n="footer.copyright">用爱和温暖编织</p>
  </footer>

  <!-- Back to Top -->
  <button class="back-to-top" onclick="window.scrollTo({top: 0})" title="回到顶部">↑</button>

  <script src="js/marked.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
